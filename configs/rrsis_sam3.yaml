# RRSIS_SAM3 Training Configuration
# All 3 datasets use the same hyperparameters

# ====== Model ======
image_size: 504          # Divisible by 14 (SAM3 ViT patch_size)
lora_rank: 16            # LoRA rank for backbone adaptation
lora_alpha: 32.0         # LoRA scaling factor
freeze_backbone: true    # Freeze ViT backbone (train only LoRA)
freeze_text_encoder: true # Freeze text encoder

# ====== Training ======
epochs: 50               # Extended for resume fine-tuning (from epoch 22)
batch_size: 2            # Per GPU (Kaggle 16GB compatible)
grad_accum_steps: 8      # Effective batch = 2 * 8 = 16 (smoother gradients)
lr: 1e-5                 # Reduced for fine-tuning (was 5e-5)
lr_backbone: 5e-6        # Reduced LoRA adapter LR (was 1e-5)
lr_decoder: 2e-5         # Reduced decoder LR (was 5e-5)
weight_decay: 0.01
warmup_epochs: 2         # Short warmup for resume (was 5)
max_tokens: 32           # SAM3 text tokenizer max length

# ====== Loss ======
dice_weight: 0.5
ce_weight: 0.5
boundary_weight: 0.2

# ====== Optimization ======
fp16: true               # Mixed precision for Kaggle 16GB
gradient_checkpointing: true
seed: 42

# ====== Dataset Specific Notes ======
# Effective batch size: 2 * 8 = 16
# RRSIS-D:   12181 train → ~762 steps/epoch (bs=16) → 38,100 total steps (50 ep)
# RRSIS-HR:  2118 train  → ~133 steps/epoch (bs=16) → 6,650 total steps (50 ep)
# RefSegRS:  2172 train  → ~136 steps/epoch (bs=16) → 6,800 total steps (50 ep)
